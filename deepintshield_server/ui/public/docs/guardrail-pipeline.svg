<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="Guardrail Pipeline">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8" />
    </marker>
    <style><![CDATA[
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 10; }
      .guard { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
      .llm { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .branch { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .label { font: 600 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #0f172a; }
      .sub { font: 500 12px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) {
        .box { fill: #1e293b; stroke: #64748b; }
        .guard { fill: #3b1f7a; stroke: #a78bfa; }
        .llm { fill: #1e3a8a; stroke: #60a5fa; }
        .branch { fill: #78350f; stroke: #fbbf24; }
        .label { fill: #f1f5f9; }
        .sub { fill: #cbd5e1; }
        .line { stroke: #64748b; }
      }
    ]]></style>
  </defs>

  <!-- Main horizontal flow -->
  <rect class="box" x="20" y="60" width="140" height="60" rx="10" />
  <text class="label" x="90" y="95" text-anchor="middle">User Input</text>

  <rect class="box guard" x="200" y="60" width="160" height="60" rx="10" />
  <text class="label" x="280" y="88" text-anchor="middle">Input Guard</text>
  <text class="sub" x="280" y="106" text-anchor="middle">PII · Injection · Toxicity</text>

  <rect class="box llm" x="400" y="60" width="140" height="60" rx="10" />
  <text class="label" x="470" y="95" text-anchor="middle">LLM</text>

  <rect class="box guard" x="580" y="60" width="160" height="60" rx="10" />
  <text class="label" x="660" y="88" text-anchor="middle">Output Guard</text>
  <text class="sub" x="660" y="106" text-anchor="middle">Redaction · Filtering</text>

  <rect class="box" x="780" y="60" width="160" height="60" rx="10" />
  <text class="label" x="860" y="95" text-anchor="middle">Response</text>

  <!-- Arrows along main flow -->
  <line class="line" x1="160" y1="90" x2="200" y2="90" marker-end="url(#arrow)" />
  <line class="line" x1="360" y1="90" x2="400" y2="90" marker-end="url(#arrow)" />
  <line class="line" x1="540" y1="90" x2="580" y2="90" marker-end="url(#arrow)" />
  <line class="line" x1="740" y1="90" x2="780" y2="90" marker-end="url(#arrow)" />

  <!-- Branch down from LLM to three guard branches -->
  <line class="line" x1="470" y1="120" x2="470" y2="180" />
  <line class="line" x1="200" y1="180" x2="740" y2="180" />
  <line class="line" x1="230" y1="180" x2="230" y2="230" marker-end="url(#arrow)" />
  <line class="line" x1="470" y1="180" x2="470" y2="230" marker-end="url(#arrow)" />
  <line class="line" x1="710" y1="180" x2="710" y2="230" marker-end="url(#arrow)" />

  <!-- Action / MCP / RAG branches -->
  <rect class="box branch" x="130" y="240" width="200" height="60" rx="10" />
  <text class="label" x="230" y="268" text-anchor="middle">Action Guard</text>
  <text class="sub" x="230" y="286" text-anchor="middle">Evaluates tool calls</text>

  <rect class="box branch" x="370" y="240" width="200" height="60" rx="10" />
  <text class="label" x="470" y="268" text-anchor="middle">MCP Guard</text>
  <text class="sub" x="470" y="286" text-anchor="middle">Evaluates MCP servers</text>

  <rect class="box branch" x="610" y="240" width="200" height="60" rx="10" />
  <text class="label" x="710" y="268" text-anchor="middle">RAG Guard</text>
  <text class="sub" x="710" y="286" text-anchor="middle">Filters retrieved docs</text>

  <!-- Downstream targets -->
  <rect class="box" x="130" y="330" width="200" height="50" rx="10" />
  <text class="label" x="230" y="360" text-anchor="middle">Tool Invocation</text>
  <rect class="box" x="370" y="330" width="200" height="50" rx="10" />
  <text class="label" x="470" y="360" text-anchor="middle">MCP Server</text>
  <rect class="box" x="610" y="330" width="200" height="50" rx="10" />
  <text class="label" x="710" y="360" text-anchor="middle">Retrieved Context</text>

  <line class="line" x1="230" y1="300" x2="230" y2="330" marker-end="url(#arrow)" />
  <line class="line" x1="470" y1="300" x2="470" y2="330" marker-end="url(#arrow)" />
  <line class="line" x1="710" y1="300" x2="710" y2="330" marker-end="url(#arrow)" />
</svg>
