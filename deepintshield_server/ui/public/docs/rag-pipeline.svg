<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" role="img" aria-label="RAG Security Pipeline">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8" />
    </marker>
    <style><![CDATA[
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .guard { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.5; }
      .data { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .llm { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .label { font: 600 14px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .sub { font: 500 12px ui-sans-serif, system-ui, sans-serif; fill: #475569; }
      .check { font: 500 13px ui-sans-serif, system-ui, sans-serif; fill: #0f172a; }
      .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) {
        .box { fill: #1e293b; stroke: #64748b; }
        .guard { fill: #3b1f7a; stroke: #a78bfa; }
        .data { fill: #14532d; stroke: #4ade80; }
        .llm { fill: #1e3a8a; stroke: #60a5fa; }
        .label, .check { fill: #f1f5f9; }
        .sub { fill: #cbd5e1; }
        .line { stroke: #64748b; }
      }
    ]]></style>
  </defs>

  <!-- Top row: Query -> Vector Store -> Retrieved Chunks -->
  <rect class="box" x="40" y="40" width="170" height="60" rx="10" />
  <text class="label" x="125" y="75" text-anchor="middle">User Query</text>

  <rect class="box data" x="260" y="40" width="170" height="60" rx="10" />
  <text class="label" x="345" y="75" text-anchor="middle">Vector Store</text>

  <rect class="box data" x="480" y="40" width="210" height="60" rx="10" />
  <text class="label" x="585" y="68" text-anchor="middle">Retrieved Chunks</text>
  <text class="sub" x="585" y="86" text-anchor="middle">Top-K from retriever</text>

  <line class="line" x1="210" y1="70" x2="260" y2="70" marker-end="url(#arrow)" />
  <line class="line" x1="430" y1="70" x2="480" y2="70" marker-end="url(#arrow)" />

  <!-- RAG Guardrail -->
  <line class="line" x1="585" y1="100" x2="585" y2="140" marker-end="url(#arrow)" />
  <rect class="box guard" x="430" y="140" width="310" height="60" rx="10" />
  <text class="label" x="585" y="168" text-anchor="middle">RAG Guardrail</text>
  <text class="sub" x="585" y="186" text-anchor="middle">shield.rag.evaluate / shield.rag.filter</text>

  <!-- Per-chunk checks -->
  <line class="line" x1="585" y1="200" x2="585" y2="230" marker-end="url(#arrow)" />
  <rect class="box" x="340" y="230" width="490" height="110" rx="10" />
  <text class="label" x="585" y="254" text-anchor="middle">For each chunk</text>
  <text class="check" x="380" y="282">• Injection attempt?</text>
  <text class="check" x="380" y="302">• Trust score threshold?</text>
  <text class="check" x="380" y="322">• Quarantined?</text>
  <text class="check" x="600" y="282">• ACL / access check?</text>
  <text class="check" x="600" y="302">• PII present?</text>
  <text class="check" x="600" y="322">• Policy match?</text>

  <!-- Safe chunks + LLM -->
  <line class="line" x1="585" y1="340" x2="585" y2="380" marker-end="url(#arrow)" />
  <rect class="box data" x="410" y="380" width="160" height="50" rx="10" />
  <text class="label" x="490" y="410" text-anchor="middle">Safe Chunks</text>
  <rect class="box llm" x="600" y="380" width="160" height="50" rx="10" />
  <text class="label" x="680" y="410" text-anchor="middle">LLM Context</text>
  <line class="line" x1="570" y1="405" x2="600" y2="405" marker-end="url(#arrow)" />
</svg>
